name: Godot CI

on:
  push:
	branches: ["**"]
  pull_request:

jobs:
  gdunit:
	runs-on: ${{ vars.GODOT_RUNNER || 'ubuntu-latest' }}
	env:
	 GODOT_VERSION: ${{ vars.GODOT_VERSION || '4.5' }}
	 GODOT_CHANNEL: ${{ vars.GODOT_CHANNEL || 'stable' }}
	 GODOT_EXE: ${{ vars.GODOT_EXE || '' }}
	steps:
	 - name: Checkout
		uses: actions/checkout@v4

	 - name: Setup Python
		uses: actions/setup-python@v5
		with:
		 python-version: "3.11"

	 - name: Cache Godot CLI
		if: env.GODOT_EXE == ''
		uses: actions/cache@v4
		with:
		 path: .godot-cli
		 key: godot-cli-${{ runner.os }}-${{ env.GODOT_VERSION }}-${{ env.GODOT_CHANNEL }}

	 - name: Download Godot CLI
		if: env.GODOT_EXE == ''
		id: godot
		shell: pwsh
		run: |
		 $godot = pwsh -File scripts/godot_cli.ps1 -Version $env:GODOT_VERSION -Channel $env:GODOT_CHANNEL
		 "godot_exe=$godot" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

	 - name: Run GdUnit tests
		shell: pwsh
		run: |
		 if ($env:GODOT_EXE) {
			pwsh -File scripts/run_tests.ps1 -GodotExe $env:GODOT_EXE
		 } else {
			pwsh -File scripts/run_tests.ps1 -GodotExe "${{ steps.godot.outputs.godot_exe }}"
		 }

	 - name: Check function coverage
		run: python scripts/check_function_tests.py
